<!doctype html>
<html lang="en">
  <head>
    <title>My AniVault | Anime Catalog</title>
    <meta name="description" content="A catalog of must-watch anime series" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <header class="main-header">
      <div class="header-inner">
          <h1 class="title"> MyAniVault</h1>
        </div>
        <p class="subtitle">My personal favorite anime collection | browse, search, and filter.</p>
      </div>
    </header>

    <div class="controls-bar">
      <input
        type="text"
        id="search-input"
        placeholder="🔍  Search by title or studio..."
        oninput="handleSearch()"
      />

      <select id="genre-filter" onchange="handleFilter()">
        <option value="all">All Genres</option>
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Psychological">Psychological</option>
        <option value="Romance">Romance</option>
        <option value="Slice of Life">Slice of Life</option>
        <option value="Sports">Sports</option>
        <option value="Horror">Horror</option>
      </select>

      <select id="sort-select" onchange="handleSort()">
        <option value="default">Sort: Default</option>
        <option value="rating-desc">Rating: High → Low</option>
        <option value="rating-asc">Rating: Low → High</option>
        <option value="year-desc">Year: Newest First</option>
        <option value="year-asc">Year: Oldest First</option>
        <option value="title-asc">Title: A → Z</option>
      </select>

      <button class="btn-reset" onclick="resetFilters()">Reset</button>
    </div>

    <div class="results-bar">
      <span id="results-count"></span>
    </div>

    <div id="card-container"></div>

    <div class="card" style="display: none">
      <div class="card-banner"></div>
      <img src="" alt="Anime Cover" class="card-img" />
      <div class="card-content">
        <div class="card-top">
          <h2 class="card-title">Title</h2>
          <span class="card-rating">★ 0.0</span>
        </div>
        <div class="card-meta">
          <span class="card-genre">Genre</span>
          <span class="card-year">Year</span>
        </div>
        <p class="card-studio">Studio</p>
        <p class="card-desc">Description</p>
        <div class="card-footer">
          <span class="card-episodes">0 eps</span>
          <span class="card-status">Status</span>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <p>AniVault &mdash; Data sourced from <a href="https://myanimelist.net" target="_blank">MyAnimeList</a></p>
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
